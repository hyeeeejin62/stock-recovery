<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>손절 복구 레스고^_ㅠ</title>
  <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Jua', sans-serif; background: #FACE68; color: #1a1a1a; min-height: 100vh; padding: 2rem 1rem; }
    .container { max-width: 720px; margin: 0 auto; }
    h1 { font-size: 22px; text-align: center; margin-bottom: 1.5rem; }
    .card { background: #fff; border: 0.5px solid rgba(0,0,0,0.1); border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 1rem; }
    .metric { background: #f5f5f3; border-radius: 8px; padding: 1rem; text-align: center; }
    .metric-label { font-size: 12px; color: #1a1a1a; font-weight: 500; margin-bottom: 4px; }
    .metric-value { font-size: 20px; }
    .grid3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 1rem; }
    .grid2 { display: grid; grid-template-columns: 1fr 1.2fr; gap: 1rem; }
    @media (max-width: 560px) { .grid2 { grid-template-columns: 1fr; } .grid3 { grid-template-columns: 1fr; } }
    .section-title { font-size: 13px; color: #1a1a1a; font-weight: 500; margin-bottom: 8px; }
    .input-row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
    .input-row label { font-size: 12px; color: #aaa; min-width: 42px; }
    input[type=text], input[type=number], input[type=date] {
      flex: 1; height: 36px; border: 0.5px solid rgba(0,0,0,0.2); border-radius: 8px;
      padding: 0 10px; font-size: 13px; font-family: 'Jua', sans-serif; background: #fff; color: #1a1a1a; outline: none;
    }
    input:focus { border-color: #FA6868; }
    button { height: 36px; border: 0.5px solid rgba(0,0,0,0.2); border-radius: 8px; background: #fff; color: #1a1a1a; font-size: 13px; font-family: 'Jua', sans-serif; cursor: pointer; }
    button:hover { background: #f5f5f3; }
    .divider { border: none; border-top: 0.5px solid rgba(0,0,0,0.1); margin: 12px 0; }
    .donut-wrap { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 8px; padding: 1rem 0; }
    .donut-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; pointer-events: none; }
    .pct-label { font-size: 26px; line-height: 1; color: #FA6868; }
    .pct-sub { font-size: 11px; color: #888; margin-top: 4px; }
    .log-table { width: 100%; font-size: 13px; border-collapse: collapse; }
    .log-table th { font-size: 12px; color: #aaa; text-align: left; padding: 4px 8px; border-bottom: 0.5px solid rgba(0,0,0,0.1); }
    .log-table td { padding: 6px 8px; border-bottom: 0.5px solid rgba(0,0,0,0.07); font-weight: 400; }
    .stock-badge { display: inline-block; font-size: 11px; background: #FEECD0; color: #C47A20; border-radius: 4px; padding: 1px 6px; }
    .del-btn { background: none; border: none; cursor: pointer; color: #ccc; font-size: 14px; padding: 2px 6px; }
    .del-btn:hover { color: #E24B4A; background: none; }
    .unit { font-size: 12px; color: #888; }
    #empty-msg { font-size: 13px; color: #aaa; text-align: center; padding: 16px 0; }
    .sync-status { font-size: 11px; color: #aaa; text-align: center; margin-top: 6px; }
  </style>
</head>
<body>
<div class="container">
  <h1>💸 손절 복구 레스고^_ㅠ</h1>

  <div class="grid3">
    <div class="metric">
      <div class="metric-label">목표 복구액</div>
      <div class="metric-value" id="m-goal" style="color:#FAAC68;">-500,000원</div>
    </div>
    <div class="metric">
      <div class="metric-label">현재 복구액</div>
      <div class="metric-value" id="m-recovered" style="color:#5A9CB5;">0원</div>
    </div>
    <div class="metric">
      <div class="metric-label">남은 금액</div>
      <div class="metric-value" id="m-remain" style="color:#bbb;">500,000원</div>
    </div>
  </div>

  <div class="grid2">
    <div class="card">
      <div class="section-title">목표 설정</div>
      <div class="input-row">
        <input type="number" id="goal-input" value="500000" step="10000" />
        <span class="unit">원</span>
      </div>
      <button onclick="updateGoal()" style="width:100%;">목표 업데이트</button>
      <hr class="divider" />
      <div class="section-title">손익 입력</div>
      <div class="input-row"><label>날짜</label><input type="date" id="date-input" /></div>
      <div class="input-row"><label>종목명</label><input type="text" id="stock-input" placeholder="예) 삼성전자" /></div>
      <div class="input-row"><label>손익</label><input type="number" id="amount-input" placeholder="이익 양수, 손실 음수" step="1000" /><span class="unit">원</span></div>
      <button onclick="addEntry()" style="width:100%;margin-top:2px;">추가하기</button>
      <div class="sync-status" id="sync-status">⏳ 데이터 불러오는 중...</div>
    </div>

    <div class="card">
      <div class="section-title">복구율</div>
      <div class="donut-wrap">
        <div style="position:relative;width:160px;height:160px;">
          <canvas id="donutChart" width="160" height="160"></canvas>
          <div class="donut-center">
            <div class="pct-label" id="pct-display">0%</div>
            <div class="pct-sub" id="pct-sub">복구 시작 전</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="section-title">기록</div>
    <table class="log-table">
      <thead><tr><th>날짜</th><th>종목</th><th>손익</th><th>누적 복구액</th><th>복구율</th><th></th></tr></thead>
      <tbody id="log-body"></tbody>
    </table>
    <div id="empty-msg">아직 기록이 없어요. 첫 손익을 입력해보세요!</div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
  // ✅ 여기에 Apps Script URL 붙여넣기!
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwUohVM9yvQB3s38LjAcZElnskfssJn-gOe3WGqjX4eV46Th4j8iUy997Q6E2X3Cb9h/exec";

  let goal = 500000;
  let entries = [];
  let donutChart = null;

  document.getElementById('date-input').value = new Date().toISOString().slice(0,10);

  function buildChart() {
    const ctx = document.getElementById('donutChart').getContext('2d');
    donutChart = new Chart(ctx, {
      type: 'doughnut',
      data: { datasets: [{ data: [0, 100], backgroundColor: ['#FA6868', 'rgba(0,0,0,0.08)'], borderWidth: 0 }] },
      options: { responsive: false, cutout: '75%', plugins: { legend: { display: false }, tooltip: { enabled: false } }, animation: { duration: 500 } }
    });
  }

  async function saveToSheet() {
    try {
      document.getElementById('sync-status').textContent = '⏳ 저장 중...';
      const url = SCRIPT_URL + '?action=save&goal=' + goal + '&entries=' + encodeURIComponent(JSON.stringify(entries));
      await fetch(url, { method: 'GET', mode: 'no-cors' });
      document.getElementById('sync-status').textContent = '✅ 저장 완료! ' + new Date().toLocaleTimeString();
    } catch (e) {
      document.getElementById('sync-status').textContent = '❌ 저장 실패. 인터넷 확인해주세요.';
    }
  }

  async function loadFromSheet() {
    try {
      const url = SCRIPT_URL + '?action=load';
      const res = await fetch(url);
      const data = await res.json();
      if (data.status === 'ok') {
        entries = data.entries.map(e => ({ date: String(e.date).slice(0,10), stock: e.stock, amount: Number(e.amount) }));
        goal = Number(data.goal) || 500000;
        document.getElementById('goal-input').value = goal;
        document.getElementById('sync-status').textContent = '✅ 데이터 불러오기 완료!';
        refresh();
      }
    } catch (e) {
      document.getElementById('sync-status').textContent = '❌ 불러오기 실패. URL을 확인해주세요.';
    }
  }

  function updateGoal() {
    const v = parseInt(document.getElementById('goal-input').value);
    if (!v || v <= 0) return;
    goal = v;
    saveToSheet();
    refresh();
  }

  function addEntry() {
    const date = document.getElementById('date-input').value;
    const stock = document.getElementById('stock-input').value.trim() || '-';
    const amount = parseInt(document.getElementById('amount-input').value);
    if (!date || isNaN(amount)) return;
    entries.push({ date, stock, amount });
    entries.sort((a, b) => a.date.localeCompare(b.date));
    document.getElementById('stock-input').value = '';
    document.getElementById('amount-input').value = '';
    saveToSheet();
    refresh();
  }

  function deleteEntry(i) {
    entries.splice(i, 1);
    saveToSheet();
    refresh();
  }

  function refresh() {
    const total = entries.reduce((s, e) => s + e.amount, 0);
    const pct = Math.min(Math.max(Math.round(total / goal * 100), 0), 100);
    const remain = Math.max(goal - total, 0);

    document.getElementById('m-goal').textContent = '-' + goal.toLocaleString() + '원';
    document.getElementById('m-recovered').textContent = total.toLocaleString() + '원';
    document.getElementById('m-remain').textContent = remain.toLocaleString() + '원';
    document.getElementById('pct-display').textContent = pct + '%';

    const sub = document.getElementById('pct-sub');
    if (pct >= 100) { sub.textContent = '완전 복구! 🎉'; sub.style.color = '#1D9E75'; }
    else if (pct > 0) { sub.textContent = '복구 중!'; sub.style.color = '#FA6868'; }
    else { sub.textContent = '복구 시작 전'; sub.style.color = '#888'; }

    donutChart.data.datasets[0].data = [pct, 100 - pct];
    donutChart.update('active');

    const tbody = document.getElementById('log-body');
    tbody.innerHTML = '';
    document.getElementById('empty-msg').style.display = entries.length ? 'none' : 'block';

    let cumulative = 0;
    entries.forEach((e, i) => {
      cumulative += e.amount;
      const rowPct = Math.round(cumulative / goal * 1000) / 10;
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>${e.date}</td>
        <td><span class="stock-badge">${e.stock}</span></td>
        <td style="color:${e.amount >= 0 ? '#5A9CB5' : '#E24B4A'};">${e.amount >= 0 ? '+' : ''}${e.amount.toLocaleString()}원</td>
        <td style="color:#1a1a1a;">${cumulative.toLocaleString()}원</td>
        <td style="color:#FA6868;">${rowPct}%</td>
        <td><button class="del-btn" onclick="deleteEntry(${i})">✕</button></td>
      `;
      tbody.appendChild(tr);
    });
  }

  buildChart();
  loadFromSheet();
</script>
</body>
</html>
